[workspace]
members = ["."]
resolver = "3"

[package]
name = "vogix"
version = "0.6.4"
edition = "2024"
authors = ["i-am-logger"]
description = "Runtime theme management for NixOS with the vogix16 design system"
license = "CC-BY-NC-SA-4.0"

[dependencies]
# CLI
clap = { version = "4.5", features = ["derive"] }
clap_complete = "4.5"

# Logging
log = "0.4"
env_logger = "0.11"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
serde_yaml = "0.9"

# Template rendering
tera = "1.20"

# System utilities
dirs = "5.0"
glob = "0.3"

# Error handling
thiserror = "2.0"

# Ontology-driven rule enforcement (local praxis; switch to git/published rev
# for the hermetic Nix build once praxis is pushed)
pr4xis = { path = "../praxis/crates/pr4xis" }
pr4xis-domains = { path = "../praxis/crates/domains" }

# Date/time for state timestamps
chrono = "0.4"

# Signal handling
ctrlc = { version = "3.4", features = ["termination"] }
libc = "0.2"

# Sway IPC
swayipc = { version = "3.0", optional = true }

# evdev — grab the keyboard + emit via uinput for the input engine (Phase 2b)
evdev = "0.13"

[dev-dependencies]
tempfile = "3.10"
serial_test = "3.2"
proptest = "1.5"

[features]
default = []
sway = ["swayipc"]
